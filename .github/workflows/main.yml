name: ScheduledNewsBot

on:
  schedule:
    # 1. 장 시작 직전 (한국 08:50)
    - cron: '50 23 * * 0-4' 
    # 2. 장 중 매시 정각 (한국 10:00 ~ 16:00)
    - cron: '0 1-7 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4  # <-- 이 부분의 오타를 수정했습니다
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-telegram-bot
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python 시황불러오기.py
