name: ScheduledNewsBot
on:
  schedule:
    # [수정] 한국시간 기준 매시간 정각 (KST = UTC+9)
    # 08:00 KST = 23:00 UTC (전날)
    - cron: '0 23 * * 0-4'   # 월~금 08:00 KST
    # 09:00~16:00 KST = 00:00~07:00 UTC
    - cron: '0 0-7 * * 1-5'  # 월~금 09:00~16:00 KST (매시 정각)

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-telegram-bot

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python 시황불러오기.py
