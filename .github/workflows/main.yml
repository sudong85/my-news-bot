name: ScheduledNewsBot

on:
  schedule:
    # 한국 시간 기준: 08:50, 12:00, 14:00 (월~금 실행)
    - cron: '50 23 * * 0-4' # 한국 08:50 (일요일 23:50 UTC가 월요일 08:50 KST)
    - cron: '0 3 * * 1-5'   # 한국 12:00
    - cron: '0 5 * * 1-5'   # 한국 14:00
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-telegram-bot
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python 시황불러오기.py
